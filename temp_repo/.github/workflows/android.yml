name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Download Gradle Wrapper JAR
      run: |
        mkdir -p gradle/wrapper
        curl -Lo gradle/wrapper/gradle-wrapper.jar \
        https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Configure secrets
      run: |
        echo "WEB_CLIENT_ID=${{ secrets.WEB_CLIENT_ID }}" > secrets.properties
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> secrets.properties

    - name: Verify secrets
      run: cat secrets.properties

    - name: Create debug keystore
      run: |
        echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" \
        | base64 -d > debug.keystore

    - name: Show keystore SHA1
      run: |
        keytool -list -v \
          -keystore debug.keystore \
          -alias androiddebugkey \
          -storepass android \
          -keypass android | grep SHA1

    - name: Build with Gradle
      run: |
        ./gradlew assembleDebug \
          --no-daemon \
          --gradle-user-home ~/.gradle

    - name: Signing Report
      run: ./gradlew app:signingReport --no-daemon
      continue-on-error: true

    - name: Get signing info
      run: |
        keytool -list -v \
        -keystore ~/.android/debug.keystore \
        -alias androiddebugkey \
        -storepass android \
        -keypass android | grep -A2 "SHA1"
      continue-on-error: true

    - name: Upload APK Debug
      uses: actions/upload-artifact@v4
      with:
        name: LocalPulse-debug
        path: |
          app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
